<section class="resume-section" id="about">
    <div class="resume-section-content">
        <img class="about-avatar mb-3 {% if site.round-avatar %}rounded-circle{% endif %}" src="{{ site.baseurl }}/{{ site.avatar }}" alt="" />
        <h1 class="mb-0">

            <!-- Edit for the header name -->
            Seunghwan <span class="text-primary">Jang</span>
            <!-- Do not edit below this line -->
            
        </h1>
        <div class="subheading mb-0">
            {{ site.subheading }}
        </div>
        <div class="mb-1" style="font-size: 0.9rem; color: #6c757d;">
            Autonomous Control for Stochastic Systems Lab; advisor: Prof. SooJean Han
        </div>
        <div class="mb-5">
            <span>{{ site.email }}</span>
        </div>
        <p class="lead mb-5">{{ site.description | newline_to_br }}</p>
        <div class="social-icons">
            {% for item in site.data.social-icons.social-icons %}
                <a class="social-icon" href="{{ item.link }}"><i class="{{ item.fa-icon }}"></i></a>
            {% endfor %}
            <a class="social-icon" href="{{ site.baseurl }}/assets/seunghwan_cv.pdf" aria-label="CV"><i class="fas fa-file-alt"></i></a>
        </div>
    </div>
</section>
